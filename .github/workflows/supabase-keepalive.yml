name: Supabase keep-alive

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase keep-alive function
        env:
          SUPABASE_KEEPALIVE_URL: ${{ secrets.SUPABASE_KEEPALIVE_URL }}
          SUPABASE_KEEPALIVE_TOKEN: ${{ secrets.SUPABASE_KEEPALIVE_TOKEN }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_KEEPALIVE_URL" ] || [ -z "$SUPABASE_KEEPALIVE_TOKEN" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Missing SUPABASE_KEEPALIVE_URL, SUPABASE_KEEPALIVE_TOKEN, or NEXT_PUBLIC_SUPABASE_ANON_KEY secret."
            exit 1
          fi

          curl --fail-with-body --silent --show-error \
            --request GET \
            --header "Authorization: Bearer $SUPABASE_ANON_KEY" \
            --header "apikey: $SUPABASE_ANON_KEY" \
            --header "x-keepalive-token: $SUPABASE_KEEPALIVE_TOKEN" \
            "$SUPABASE_KEEPALIVE_URL"